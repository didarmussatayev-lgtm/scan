<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рабочий Сканер Склада</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-align: center; background: #1e1e24; color: #fff; margin: 0; padding: 15px; }
        .wrapper { max-width: 420px; margin: 0 auto; background: #2a2a35; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #video-container { width: 100%; height: 260px; background: #000; border-radius: 8px; overflow: hidden; position: relative; margin-top: 15px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; top: 50%; left: 5%; width: 90%; height: 2px; background: #ff3333; box-shadow: 0 0 8px #ff3333; z-index: 10; }
        .btn { background: #007bff; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #log-box { text-align: left; background: #111; color: #00ff66; font-family: monospace; padding: 12px; border-radius: 6px; margin-top: 15px; font-size: 13px; max-height: 140px; overflow-y: auto; white-space: pre-wrap; }
        .err { color: #ff4d4d; }
    </style>
</head>
<body>

<div class="wrapper">
    <h3 style="margin: 0 0 5px 0;">Складской Сканер v3</h3>
    <p style="color: #aaa; font-size: 13px; margin: 0;">Наведите красную линию на штрихкод товара</p>
    
    <div id="video-container">
        <video id="video"></video>
        <div class="laser"></div>
    </div>

    <button class="btn" id="scan-trigger">Включить камеру</button>
    
    <div id="log-box">Система готова к запуску.</div>
</div>

<script>
    // 1. ВСТАВЬТЕ СЮДА ВАШ WEBHOOK ИЗ N8N
    const N8N_URL = 'https://primary-production-6c79b.up.railway.app/webhook-test/f134cd2e-fd08-45d2-b90d-c97514ad45f7';

    const logBox = document.getElementById('log-box');
    let codeReader;
    let isScanning = false;
    let lock = false;

    function printLog(text, isErr = false) {
        const time = new Date().toLocaleTimeString();
        const msg = isErr ? `<span class="err">[ОШИБКА] ${text}</span>` : `[${time}] ${text}`;
        logBox.innerHTML += '<br>' + msg;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // Инициализация автономного сканера ZXing
    document.getElementById('scan-trigger').addEventListener('click', () => {
        if (isScanning) return;
        isScanning = true;
        printLog('Инициализация камеры и движка ZXing...');

        codeReader = new ZXing.BrowserMultiFormatReader();
        
        // Запуск непрерывного декодирования с задней камеры
        codeReader.decodeFromVideoDevice(undefined, 'video', (result, error) => {
            if (result && !lock) {
                lock = true; // Блокировка от повторных срабатываний
                const barcode = result.text;
                printLog(`Успешно считан код: ${barcode}`);
                
                if (navigator.vibrate) navigator.vibrate(100); // Вибрация при успехе
                
                sendDataToN8n(barcode);
            }
            // Ошибки фонового поиска (когда в кадре нет кода) просто игнорируем, чтобы не спамить лог
        }).then(() => {
            printLog('Камера работает. Сканируйте штрихкоды товаров.');
        }).catch(err => {
            isScanning = false;
            printLog('Не удалось запустить камеру: ' + err.message, true);
        });
    });

    // Функция отправки в n8n без блокировок CORS браузера
    function sendDataToN8n(code) {
        printLog(`Отправка на n8n...`);

        // Используем режим 'no-cors', чтобы браузер телефона НЕ блокировал запрос
        fetch(N8N_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ barcode: code, scanned_at: new Date().toISOString() })
        })
        .then(() => {
            // При 'no-cors' браузер не отдаст нам тело ответа, но сам факт успешного выполнения промиса означает, что данные улетели!
            printLog(`Данные кода ${code} успешно улетели в сторону n8n!`);
        })
        .catch(err => {
            printLog(`Ошибка отправки: ${err.message}`, true);
        })
        .finally(() => {
            // Через 3 секунды снимаем блок и готовы сканировать следующий товар
            setTimeout(() => { lock = false; }, 3000);
        });
    }
</script>

</body>
</html>
