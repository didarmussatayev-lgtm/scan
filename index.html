<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Складской Сканер (n8n + Supabase)</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.4/minified/html5-qrcode.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            background: #f8f9fa; 
            padding: 20px; 
            color: #333; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            max-width: 600px; 
            width: 100%;
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        h2 { 
            margin-bottom: 10px; 
            color: #1a1a1a; 
            font-size: 24px;
        }
        .subtitle {
            color: #666; 
            font-size: 14px;
            margin-bottom: 20px;
        }
        #reader { 
            width: 100%; 
            border-radius: 8px; 
            overflow: hidden; 
            background: #000; 
            margin-top: 15px;
            border: 2px solid #ddd;
            aspect-ratio: 1;
        }
        .status { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 16px; 
            display: none; 
            word-wrap: break-word;
        }
        .success { 
            background: #d4edda; 
            color: #155724; 
            border: 1px solid #c3e6cb;
            display: block; 
        }
        .error { 
            background: #f8d7da; 
            color: #721c24; 
            border: 1px solid #f5c6cb;
            display: block; 
        }
        .loading { 
            background: #fff3cd; 
            color: #856404; 
            border: 1px solid #ffeaa7;
            display: block; 
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        .scanned-list {
            margin-top: 20px;
            text-align: left;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
        .scanned-list h3 {
            margin-bottom: 10px;
            font-size: 14px;
            color: #333;
        }
        .scanned-item {
            background: white;
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            font-size: 12px;
            border-left: 3px solid #28a745;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-start {
            background: #28a745;
            color: white;
        }
        .btn-start:hover {
            background: #218838;
        }
        .btn-stop {
            background: #dc3545;
            color: white;
        }
        .btn-stop:hover {
            background: #c82333;
        }
        .btn-clear {
            background: #6c757d;
            color: white;
        }
        .btn-clear:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Складской Сканер</h2>
    <p class="subtitle">Наведите камеру на QR-код или штрихкод товара</p>
    
    <!-- Область для видео с камеры -->
    <div id="reader"></div>
    
    <!-- Статус -->
    <div id="status-box" class="status info">Инициализация камеры...</div>
    
    <!-- Кнопки управления -->
    <div class="controls">
        <button class="btn-start" id="start-btn" onclick="startScanning()" style="display:none;">Начать сканирование</button>
        <button class="btn-stop" id="stop-btn" onclick="stopScanning()" style="display:none;">Остановить</button>
        <button class="btn-clear" onclick="clearScanned()">Очистить список</button>
    </div>
    
    <!-- История отсканированных товаров -->
    <div class="scanned-list">
        <h3>✓ История сканирования:</h3>
        <div id="scanned-items"></div>
    </div>
</div>

<script>
    // КОНФИГУРАЦИЯ
    const N8N_WEBHOOK_URL = 'https://your-n8n-domain.com/webhook/v1/barcode-scan';
    
    // ПЕРЕМЕННЫЕ
    const statusBox = document.getElementById('status-box');
    const scannedItems = document.getElementById('scanned-items');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    
    let html5QrcodeScanner = null;
    let isProcessing = false;
    let scannedBarcodes = [];

    function showStatus(text, type = 'info') {
        statusBox.className = 'status ' + type;
        statusBox.innerText = text;
    }

    function addScannedItem(barcode) {
        const timestamp = new Date().toLocaleTimeString('ru-RU');
        scannedBarcodes.unshift({ barcode, timestamp });
        
        const itemDiv = document.createElement('div');
        itemDiv.className = 'scanned-item';
        itemDiv.innerText = `${barcode} — ${timestamp}`;
        scannedItems.insertBefore(itemDiv, scannedItems.firstChild);
    }

    function clearScanned() {
        scannedBarcodes = [];
        scannedItems.innerHTML = '';
    }

    // Отправка в n8n
    function sendToN8n(barcode) {
        isProcessing = true;
        showStatus(`📤 Отправка: ${barcode}...`, 'loading');

        fetch(N8N_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                barcode: barcode,
                scanned_at: new Date().toISOString()
            })
        })
        .then(response => {
            if (response.ok) {
                showStatus(`✅ Успешно! ${barcode}`, 'success');
                addScannedItem(barcode);
            } else {
                showStatus(`❌ Ошибка сервера (${response.status})`, 'error');
            }
        })
        .catch(err => {
            console.error('Network error:', err);
            showStatus(`⚠️ Локальное сохранение: ${barcode}`, 'info');
            addScannedItem(barcode);
        })
        .finally(() => {
            setTimeout(() => { isProcessing = false; }, 2000);
        });
    }

    // Обработчик сканирования
    function onScanSuccess(decodedText, decodedResult) {
        if (isProcessing) return;
        console.log('Barcode scanned:', decodedText);
        sendToN8n(decodedText);
    }

    function onScanError(error) {
        // Игнорируем ошибки сканирования (это нормально, когда нечего сканировать)
        console.log('Scan error (normal):', error);
    }

    // Инициализация сканера
    function initScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear();
        }

        html5QrcodeScanner = new Html5Qrcode("reader");
        
        // Пытаемся запустить камеру с задней камеры
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length) {
                console.log('Available cameras:', devices);
                const backCamera = devices.find(device => 
                    device.label.toLowerCase().includes('back') || 
                    device.label.toLowerCase().includes('rear')
                ) || devices[devices.length - 1]; // Если нет задней, берем последнюю
                
                startScanningWithCamera(backCamera.id);
            } else {
                showStatus('❌ Камеры не найдены', 'error');
            }
        }).catch(err => {
            console.error('Error getting cameras:', err);
            showStatus('❌ Ошибка доступа к камере', 'error');
        });
    }

    function startScanningWithCamera(cameraId) {
        const qrboxFunction = function(viewfinderWidth, viewfinderHeight) {
            const minDimension = Math.min(viewfinderWidth, viewfinderHeight);
            const boxSize = Math.floor(minDimension * 0.8);
            return { width: boxSize, height: boxSize };
        };

        html5QrcodeScanner.start(
            cameraId,
            {
                fps: 10,
                qrbox: qrboxFunction,
                aspectRatio: 1.0,
                disableFlip: false
            },
            onScanSuccess,
            onScanError
        ).then(() => {
            console.log('Scanner started successfully');
            showStatus('✅ Сканер активен. Наведите на код...', 'info');
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
        }).catch(err => {
            console.error('Error starting scanner:', err);
            showStatus(`❌ Ошибка запуска: ${err}`, 'error');
            startBtn.style.display = 'inline-block';
        });
    }

    function startScanning() {
        showStatus('⏳ Запуск камеры...', 'loading');
        initScanner();
    }

    function stopScanning() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                html5QrcodeScanner.clear();
                showStatus('⏹️ Сканирование остановлено', 'info');
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            }).catch(err => {
                console.error('Error stopping scanner:', err);
            });
        }
    }

    // Инициализация при загрузке страницы
    window.addEventListener('load', () => {
        console.log('Page loaded, initializing scanner');
        initScanner();
    });

    // Очистка при закрытии страницы
    window.addEventListener('beforeunload', () => {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().catch(err => console.error('Error stopping on unload:', err));
        }
    });
</script>

</body>
</html>
