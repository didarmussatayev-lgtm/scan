<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рабочий Сканер Склада</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-align: center; background: #1e1e24; color: #fff; margin: 0; padding: 15px; }
        .wrapper { max-width: 420px; margin: 0 auto; background: #2a2a35; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #video-container { width: 100%; height: 260px; background: #000; border-radius: 8px; overflow: hidden; position: relative; margin-top: 15px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; top: 50%; left: 5%; width: 90%; height: 2px; background: #ff3333; box-shadow: 0 0 8px #ff3333; z-index: 10; }
        .btn { background: #007bff; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn:hover { background: #0056b3; }
        .btn-stop { background: #dc3545; margin-top: 5px; }
        #log-box { text-align: left; background: #111; color: #00ff66; font-family: monospace; padding: 12px; border-radius: 6px; margin-top: 15px; font-size: 12px; max-height: 180px; overflow-y: auto; border: 1px solid #333; }
        .err { color: #ff4d4d; }
        .success { color: #00ff66; }
        .counter { background: #28a745; padding: 10px; border-radius: 6px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <h3 style="margin: 0 0 5px 0;">📦 Складской Сканер v3</h3>
    <p style="color: #aaa; font-size: 13px; margin: 0;">Наведите красную линию на штрихкод товара</p>
    
    <div id="video-container">
        <video id="video"></video>
        <div class="laser"></div>
    </div>

    <button class="btn" id="scan-trigger">▶ Включить камеру</button>
    <button class="btn btn-stop" id="stop-trigger" style="display:none;">⏹ Стоп</button>
    
    <div class="counter">
        Отсканировано: <span id="count">0</span> ✓
    </div>
    
    <div id="log-box">Система готова к запуску.</div>
</div>

<script>
    // WEBHOOK URL ИЗ N8N
    const N8N_URL = 'https://primary-production-6c79b.up.railway.app/webhook-test/f134cd2e-fd08-45d2-b90d-c97514ad45f7';

    const logBox = document.getElementById('log-box');
    const scanTrigger = document.getElementById('scan-trigger');
    const stopTrigger = document.getElementById('stop-trigger');
    const countDisplay = document.getElementById('count');
    
    let codeReader;
    let isScanning = false;
    let lock = false;
    let scannedCount = 0;
    let decodingSession = null;

    function printLog(text, isErr = false, isSuccess = false) {
        const time = new Date().toLocaleTimeString();
        let className = '';
        if (isErr) className = 'err';
        else if (isSuccess) className = 'success';
        
        const msg = `<span class="${className}">[${time}] ${text}</span>`;
        logBox.innerHTML += msg + '<br>';
        logBox.scrollTop = logBox.scrollHeight;
    }

    // Кнопка "Включить камеру"
    scanTrigger.addEventListener('click', async () => {
        if (isScanning) return;
        
        try {
            isScanning = true;
            scanTrigger.style.display = 'none';
            stopTrigger.style.display = 'block';
            printLog('📷 Инициализация камеры и ZXing...', false, false);

            codeReader = new ZXing.BrowserMultiFormatReader();
            
            // Запуск декодирования
            decodingSession = await codeReader.decodeFromVideoDevice(undefined, 'video', (result, error) => {
                if (result && !lock) {
                    lock = true;
                    const barcode = result.text;
                    scannedCount++;
                    countDisplay.innerText = scannedCount;
                    
                    printLog(`✓ Код: ${barcode}`, false, true);
                    
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    
                    // Отправляем в N8N
                    sendDataToN8n(barcode);
                }
            });
            
            printLog('✓ Камера работает. Сканируйте штрихкоды.', false, true);

        } catch (err) {
            isScanning = false;
            scanTrigger.style.display = 'block';
            stopTrigger.style.display = 'none';
            printLog(`❌ Ошибка камеры: ${err.message}`, true);
        }
    });

    // Кнопка "Стоп"
    stopTrigger.addEventListener('click', () => {
        if (codeReader) {
            codeReader.reset();
        }
        isScanning = false;
        scanTrigger.style.display = 'block';
        stopTrigger.style.display = 'none';
        printLog('⏹ Сканирование остановлено.');
    });

    // Отправка в N8N через GET параметр
    function sendDataToN8n(code) {
        // Правильный способ: GET запрос с параметром в URL
        const webhookUrl = N8N_URL + '?barcode=' + encodeURIComponent(code);
        
        printLog(`📤 Отправка кода ${code} в N8N...`);

        fetch(webhookUrl, {
            method: 'GET',
            headers: {
                'Accept': 'application/json'
            }
        })
        .then(response => {
            // Проверяем статус ответа
            if (response.ok) {
                printLog(`✓ N8N получил код: ${code}`, false, true);
            } else {
                printLog(`⚠ N8N ответил со статусом ${response.status}`, true);
            }
            return response.text();
        })
        .then(data => {
            if (data) {
                printLog(`N8N ответ: ${data.substring(0, 50)}`);
            }
        })
        .catch(err => {
            printLog(`❌ Ошибка отправки: ${err.message}`, true);
        })
        .finally(() => {
            // Через 2 секунды разблокируем сканирование
            setTimeout(() => { 
                lock = false;
                printLog('Готов к следующему коду.');
            }, 2000);
        });
    }

    // При закрытии страницы
    window.addEventListener('beforeunload', () => {
        if (codeReader) {
            codeReader.reset();
        }
    });
</script>

</body>
</html>
