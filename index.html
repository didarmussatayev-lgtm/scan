<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Складской Сканер (n8n + Supabase)</title>
    <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            background: #f8f9fa; 
            padding: 20px; 
            color: #333; 
            min-height: 100vh;
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto;
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        h2 { 
            margin-bottom: 10px; 
            color: #1a1a1a; 
            font-size: 24px;
        }
        .subtitle {
            color: #666; 
            font-size: 14px;
            margin-bottom: 20px;
        }
        #reader { 
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            border-radius: 8px; 
            overflow: hidden; 
            background: #000; 
            border: 3px solid #ddd;
        }
        #reader video {
            width: 100%;
            height: auto;
            display: block;
        }
        .status { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 16px; 
            display: none; 
            word-wrap: break-word;
        }
        .success { 
            background: #d4edda; 
            color: #155724; 
            border: 1px solid #c3e6cb;
            display: block; 
        }
        .error { 
            background: #f8d7da; 
            color: #721c24; 
            border: 1px solid #f5c6cb;
            display: block; 
        }
        .loading { 
            background: #fff3cd; 
            color: #856404; 
            border: 1px solid #ffeaa7;
            display: block; 
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            display: block;
        }
        .scanned-list {
            margin-top: 20px;
            text-align: left;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
        .scanned-list h3 {
            margin-bottom: 10px;
            font-size: 14px;
            color: #333;
        }
        .scanned-item {
            background: white;
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            font-size: 12px;
            border-left: 3px solid #28a745;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-start {
            background: #28a745;
            color: white;
        }
        .btn-start:hover {
            background: #218838;
        }
        .btn-stop {
            background: #dc3545;
            color: white;
        }
        .btn-stop:hover {
            background: #c82333;
        }
        .btn-clear {
            background: #6c757d;
            color: white;
        }
        .btn-clear:hover {
            background: #5a6268;
        }
        .debug-info {
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 6px;
            font-size: 12px;
            text-align: left;
            color: #666;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Складской Сканер</h2>
    <p class="subtitle">Наведите камеру на QR-код или штрихкод товара</p>
    
    <!-- Область для видео с камеры -->
    <div id="reader"></div>
    
    <!-- Статус -->
    <div id="status-box" class="status info">Инициализация камеры...</div>
    
    <!-- Кнопки управления -->
    <div class="controls">
        <button class="btn-start" id="start-btn" onclick="startScanning()">Начать сканирование</button>
        <button class="btn-stop" id="stop-btn" onclick="stopScanning()" style="display:none;">Остановить</button>
        <button class="btn-clear" onclick="clearScanned()">Очистить список</button>
    </div>
    
    <!-- История отсканированных товаров -->
    <div class="scanned-list">
        <h3>✓ История сканирования:</h3>
        <div id="scanned-items"></div>
    </div>

    <!-- Debug информация -->
    <div class="debug-info" id="debug-info"></div>
</div>

<script>
    // КОНФИГУРАЦИЯ
    const N8N_WEBHOOK_URL = 'https://primary-production-6c79b.up.railway.app/webhook-test/f134cd2e-fd08-45d2-b90d-c97514ad45f7';
    
    // ПЕРЕМЕННЫЕ
    const statusBox = document.getElementById('status-box');
    const scannedItems = document.getElementById('scanned-items');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const debugInfo = document.getElementById('debug-info');
    
    let html5QrcodeScanner = null;
    let isProcessing = false;
    let scannedBarcodes = [];
    let isScannerRunning = false;

    function debug(msg) {
        console.log(msg);
        debugInfo.innerHTML += msg + '<br>';
        debugInfo.scrollTop = debugInfo.scrollHeight;
    }

    function showStatus(text, type = 'info') {
        statusBox.className = 'status ' + type;
        statusBox.innerText = text;
        debug('STATUS: ' + text);
    }

    function addScannedItem(barcode) {
        const timestamp = new Date().toLocaleTimeString('ru-RU');
        scannedBarcodes.unshift({ barcode, timestamp });
        
        const itemDiv = document.createElement('div');
        itemDiv.className = 'scanned-item';
        itemDiv.innerText = `${barcode} — ${timestamp}`;
        scannedItems.insertBefore(itemDiv, scannedItems.firstChild);
    }

    function clearScanned() {
        scannedBarcodes = [];
        scannedItems.innerHTML = '';
    }

    // Отправка в n8n
    function sendToN8n(barcode) {
        isProcessing = true;
        showStatus(`📤 Отправка: ${barcode}...`, 'loading');

        fetch(N8N_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                barcode: barcode,
                scanned_at: new Date().toISOString()
            })
        })
        .then(response => {
            if (response.ok) {
                showStatus(`✅ Успешно! ${barcode}`, 'success');
                addScannedItem(barcode);
            } else {
                showStatus(`❌ Ошибка сервера (${response.status})`, 'error');
            }
        })
        .catch(err => {
            console.error('Network error:', err);
            debug('Network error: ' + err.message);
            showStatus(`⚠️ Локальное сохранение: ${barcode}`, 'info');
            addScannedItem(barcode);
        })
        .finally(() => {
            setTimeout(() => { isProcessing = false; }, 2000);
        });
    }

    // Обработчик сканирования
    function onScanSuccess(decodedText, decodedResult) {
        if (isProcessing) return;
        debug('🔍 Barcode scanned: ' + decodedText);
        sendToN8n(decodedText);
    }

    function onScanError(error) {
        // Игнорируем ошибки сканирования (это нормально)
    }

    // Инициализация сканера
    function startScanning() {
        if (isScannerRunning) {
            debug('Scanner already running');
            return;
        }

        showStatus('⏳ Запуск камеры...', 'loading');
        debug('Starting scanner...');
        
        if (html5QrcodeScanner) {
            debug('Stopping existing scanner');
            try {
                html5QrcodeScanner.clear();
            } catch (e) {
                debug('Error clearing scanner: ' + e.message);
            }
        }

        try {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { 
                    fps: 10,
                    qrbox: { width: 250, height: 150 },
                    rememberLastUsedCamera: true,
                    useBarCodeDetectorIfSupported: true,
                    aspectRatio: 1.0
                },
                false // verbose
            );

            debug('Scanner created, rendering...');

            html5QrcodeScanner.render(
                onScanSuccess,
                onScanError
            );

            isScannerRunning = true;
            showStatus('✅ Сканер активен. Наведите на код...', 'info');
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            debug('Scanner started successfully');

        } catch (err) {
            debug('Error starting scanner: ' + err.message);
            console.error('Error starting scanner:', err);
            showStatus(`❌ Ошибка: ${err.message}`, 'error');
            isScannerRunning = false;
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
        }
    }

    function stopScanning() {
        debug('Stopping scanner...');
        try {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().then(() => {
                    debug('Scanner stopped');
                    showStatus('⏹️ Сканирование остановлено', 'info');
                    isScannerRunning = false;
                    startBtn.style.display = 'inline-block';
                    stopBtn.style.display = 'none';
                }).catch(err => {
                    debug('Error stopping scanner: ' + err.message);
                });
            }
        } catch (err) {
            debug('Error in stopScanning: ' + err.message);
            isScannerRunning = false;
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
        }
    }

    // Инициализация при загрузке страницы
    window.addEventListener('load', () => {
        debug('=== Page loaded ===');
        debug('html5-qrcode version available');
    });

    // Очистка при закрытии страницы
    window.addEventListener('beforeunload', () => {
        if (isScannerRunning && html5QrcodeScanner) {
            try {
                html5QrcodeScanner.clear();
            } catch (e) {
                console.error('Error on unload:', e);
            }
        }
    });
</script>

</body>
</html>
